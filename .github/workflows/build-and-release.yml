name: Build and Release Client

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd client
          npm install

      - name: Inject API key (build-time config)
        shell: bash
        run: |
          if [ -z "${{ secrets.CARNAGE_API_KEY }}" ]; then
            echo "::error::Falta el secret CARNAGE_API_KEY en el repositorio (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          echo "module.exports = { apiKey: '${{ secrets.CARNAGE_API_KEY }}' };" > client/config.gen.js

      - name: Build executable
        run: |
          npx pkg client/carnage_client.js --targets node18-win-x64 --output dist/CarnageReporter.exe

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CarnageReporter.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
