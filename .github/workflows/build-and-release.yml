name: Build and Release Client

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd client
          npm install

      - name: Inject API key (build-time config)
        shell: bash
        run: |
          if [ -z "${{ secrets.CARNAGE_API_KEY }}" ]; then
            echo "::error::Falta el secret CARNAGE_API_KEY en el repositorio (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          echo "module.exports = { apiKey: '${{ secrets.CARNAGE_API_KEY }}' };" > client/config.gen.js

      - name: Build executable
        run: |
          npx pkg client/carnage_client.js --targets node18-win-x64 --output dist/CarnageReporter.exe

      # Metadatos del ejecutable (buena práctica y requisito futuro de SignPath).
      # NO bloquea el release: si rcedit falla, el exe se publica igual sin metadata.
      - name: Set executable metadata (opcional)
        continue-on-error: true
        shell: bash
        run: |
          export VERSION="${GITHUB_REF_NAME#v}.0"
          npm install --no-save rcedit
          node -e "require('rcedit')('dist/CarnageReporter.exe',{'version-string':{ProductName:'Carnage Reporter',FileDescription:'Carnage Reporter - Halo 3 MCC Stats Tracker',CompanyName:'iChocko',LegalCopyright:'GPL-3.0 (c) iChocko - github.com/iChocko/CarnageReporter'},'file-version':process.env.VERSION,'product-version':process.env.VERSION}).then(()=>console.log('metadata OK')).catch(e=>{console.error(e);process.exit(1)});"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CarnageReporter.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
