name: Build and Release Client

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd client
          npm install

      - name: Inject API key (build-time config)
        shell: bash
        run: |
          if [ -z "${{ secrets.CARNAGE_API_KEY }}" ]; then
            echo "::error::Falta el secret CARNAGE_API_KEY en el repositorio (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          echo "module.exports = { apiKey: '${{ secrets.CARNAGE_API_KEY }}' };" > client/config.gen.js

      - name: Build executable
        run: |
          npx pkg client/carnage_client.js --targets node18-win-x64 --output dist/CarnageReporter.exe

      # Metadatos del ejecutable (requisito de SignPath Foundation y buena práctica:
      # el exe muestra producto/versión reales en Propiedades en vez de datos genéricos)
      - name: Set executable metadata
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npx rcedit "dist/CarnageReporter.exe" \
            --set-version-string "ProductName" "Carnage Reporter" \
            --set-version-string "FileDescription" "Carnage Reporter - Halo 3 MCC Stats Tracker" \
            --set-version-string "CompanyName" "iChocko" \
            --set-version-string "LegalCopyright" "GPL-3.0 (c) iChocko - github.com/iChocko/CarnageReporter" \
            --set-file-version "$VERSION.0" \
            --set-product-version "$VERSION.0"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CarnageReporter.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
